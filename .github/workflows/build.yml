name: Build (MinGW x86 — XP compat)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-mingw-x86:
    name: MinGW-w64 i686 (Windows XP target)
    runs-on: windows-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Install MinGW-w64 i686 via MSYS2 ────────────────
      - name: Set up MSYS2 + MinGW i686
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW32
          update: true
          install: |
            mingw-w64-i686-gcc
            mingw-w64-i686-cmake
            mingw-w64-i686-make
            mingw-w64-i686-tools-git

      # ── 3. Cache ImGui source ───────────────────────────────
      - name: Cache Dear ImGui v1.90.9
        id: cache-imgui
        uses: actions/cache@v4
        with:
          path: imgui
          key: imgui-1.90.9

      - name: Download Dear ImGui v1.90.9
        if: steps.cache-imgui.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $url = 'https://github.com/ocornut/imgui/archive/refs/tags/v1.90.9.zip'
          Invoke-WebRequest -Uri $url -OutFile imgui.zip
          Expand-Archive imgui.zip -DestinationPath .
          Rename-Item imgui-1.90.9 imgui

      # ── 4. Download Electrolize font and generate header ────
      - name: Download Electrolize-Regular.ttf
        shell: pwsh
        run: |
          $url = 'https://github.com/google/fonts/raw/main/ofl/electrolize/Electrolize-Regular.ttf'
          Invoke-WebRequest -Uri $url -OutFile 'Electrolize-Regular.ttf'
          Write-Host "Downloaded: $((Get-Item 'Electrolize-Regular.ttf').Length) bytes"

      - name: Generate src/font_electrolize.h
        shell: pwsh
        run: |
          $bytes = [System.IO.File]::ReadAllBytes('Electrolize-Regular.ttf')
          $lines = [System.Collections.Generic.List[string]]::new()
          $lines.Add('#pragma once')
          $lines.Add('')
          $lines.Add('// Auto-generated from Electrolize-Regular.ttf (OFL 1.1)')
          $lines.Add("static const unsigned int electrolize_regular_ttf_len = $($bytes.Length)u;")
          $lines.Add('static const unsigned char electrolize_regular_ttf[] = {')
          $row = [System.Text.StringBuilder]::new()
          for ($i = 0; $i -lt $bytes.Length; $i++) {
            if ($i % 16 -eq 0) { $null = $row.Append('    ') }
            $null = $row.Append("0x$($bytes[$i].ToString('x2')), ")
            if (($i + 1) % 16 -eq 0 -or $i -eq $bytes.Length - 1) {
              $lines.Add($row.ToString().TrimEnd())
              $null = $row.Clear()
            }
          }
          $lines.Add('};')
          [System.IO.File]::WriteAllLines('src/font_electrolize.h', $lines)
          Write-Host "Generated src/font_electrolize.h ($($bytes.Length) bytes embedded)"

      # ── 5. Download Font Awesome 6 Solid and generate header ─
      - name: Download Font Awesome 6 Solid TTF
        shell: pwsh
        run: |
          $url = 'https://github.com/FortAwesome/Font-Awesome/raw/6.x/webfonts/fa-solid-900.ttf'
          Invoke-WebRequest -Uri $url -OutFile 'fa-solid-900.ttf'
          Write-Host "Downloaded FA6 Solid: $((Get-Item 'fa-solid-900.ttf').Length) bytes"

      - name: Generate src/font_icons.h
        shell: pwsh
        run: |
          $bytes = [System.IO.File]::ReadAllBytes('fa-solid-900.ttf')
          $lines = [System.Collections.Generic.List[string]]::new()
          $lines.Add('#pragma once')
          $lines.Add('')
          $lines.Add('// Auto-generated from fa-solid-900.ttf (Font Awesome 6 Free, OFL 1.1)')
          $lines.Add("static const unsigned int  fa6_solid_ttf_len = $($bytes.Length)u;")
          $lines.Add('static const unsigned char fa6_solid_ttf[] = {')
          $row = [System.Text.StringBuilder]::new()
          for ($i = 0; $i -lt $bytes.Length; $i++) {
            if ($i % 16 -eq 0) { $null = $row.Append('    ') }
            $null = $row.Append("0x$($bytes[$i].ToString('x2')), ")
            if (($i + 1) % 16 -eq 0 -or $i -eq $bytes.Length - 1) {
              $lines.Add($row.ToString().TrimEnd())
              $null = $row.Clear()
            }
          }
          $lines.Add('};')
          [System.IO.File]::WriteAllLines('src/font_icons.h', $lines)
          Write-Host "Generated src/font_icons.h ($($bytes.Length) bytes embedded)"

      # ── 6. Generate logo header from PNG ───────────────────
      - name: Generate src/logo_data.h from Sightline Logo.png
        shell: pwsh
        run: |
          $src = 'src/Sightline Logo.png'
          if (-not (Test-Path $src)) {
            Write-Host 'Logo PNG not found, skipping header generation'
            '#pragma once' | Set-Content 'src/logo_data.h'
            'static const unsigned char sightline_logo_png[] = {};' | Add-Content 'src/logo_data.h'
            'static const unsigned int sightline_logo_png_len = 0u;' | Add-Content 'src/logo_data.h'
            exit 0
          }
          $bytes = [System.IO.File]::ReadAllBytes($src)
          $lines = [System.Collections.Generic.List[string]]::new()
          $lines.Add('#pragma once')
          $lines.Add('')
          $lines.Add('// Auto-generated from Sightline Logo.png')
          $lines.Add("static const unsigned int sightline_logo_png_len = $($bytes.Length)u;")
          $lines.Add('static const unsigned char sightline_logo_png[] = {')
          $row = [System.Text.StringBuilder]::new()
          for ($i = 0; $i -lt $bytes.Length; $i++) {
            if ($i % 16 -eq 0) { $null = $row.Append('    ') }
            $null = $row.Append("0x$($bytes[$i].ToString('x2')), ")
            if (($i + 1) % 16 -eq 0 -or $i -eq $bytes.Length - 1) {
              $lines.Add($row.ToString().TrimEnd())
              $null = $row.Clear()
            }
          }
          $lines.Add('};')
          [System.IO.File]::WriteAllLines('src/logo_data.h', $lines)
          Write-Host "Generated src/logo_data.h ($($bytes.Length) bytes embedded)"

      # ── 7. Compile icon resource (.rc -> .o) ───────────────
      - name: Compile icon resource with windres
        shell: msys2 {0}
        run: |
          if [ -f src/sightline.rc ] && [ -f src/favicon.ico ]; then
            windres src/sightline.rc --include-dir src -o sightline_res.o
            echo "windres OK — icon resource compiled"
          else
            echo "WARNING: sightline.rc or favicon.ico missing — skipping icon"
            touch sightline_res_missing
          fi

      # ── 8. Build ────────────────────────────────────────────
      - name: Build SightlinePlayer.exe
        shell: msys2 {0}
        run: |
          set -e

          IMGUI=imgui

          SRC="src/main.cpp \
              $IMGUI/imgui.cpp \
              $IMGUI/imgui_draw.cpp \
              $IMGUI/imgui_tables.cpp \
              $IMGUI/imgui_widgets.cpp \
              $IMGUI/backends/imgui_impl_win32.cpp \
              $IMGUI/backends/imgui_impl_dx9.cpp"

          INC="-Isrc -I$IMGUI -I$IMGUI/backends"
          DEFS="-DWINVER=0x0501 -D_WIN32_WINNT=0x0501 -DWIN32_LEAN_AND_MEAN"
          FLAGS="-m32 -O2 -mwindows -static -static-libgcc -static-libstdc++"
          LIBS="-ld3d9 -ldwmapi -luser32 -lgdi32 -lgdiplus -lshell32 -lole32 -loleaut32 -luuid"

          if [ -f sightline_res.o ]; then
            g++ $FLAGS $DEFS $INC $SRC sightline_res.o -o SightlinePlayer.exe $LIBS
            echo "Build OK with icon — $(du -h SightlinePlayer.exe)"
          else
            g++ $FLAGS $DEFS $INC $SRC -o SightlinePlayer.exe $LIBS
            echo "Build OK without icon — $(du -h SightlinePlayer.exe)"
          fi

      # ── 9. Upload artifact ──────────────────────────────────
      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: SightlinePlayer-x86-XPcompat
          path: SightlinePlayer.exe
          retention-days: 30

name: Build (MinGW x86 — XP compat)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-mingw-x86:
    name: MinGW-w64 i686 (Windows XP target)
    runs-on: windows-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Install MinGW-w64 i686 via MSYS2 ────────────────
      - name: Set up MSYS2 + MinGW i686
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW32
          update: true
          install: |
            mingw-w64-i686-gcc
            mingw-w64-i686-cmake
            mingw-w64-i686-make
            mingw-w64-i686-tools-git

      # ── 3. Cache ImGui source ───────────────────────────────
      - name: Cache Dear ImGui v1.90.9
        id: cache-imgui
        uses: actions/cache@v4
        with:
          path: imgui
          key: imgui-1.90.9

      - name: Download Dear ImGui v1.90.9
        if: steps.cache-imgui.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $url = 'https://github.com/ocornut/imgui/archive/refs/tags/v1.90.9.zip'
          $zip = 'imgui.zip'
          Invoke-WebRequest -Uri $url -OutFile $zip
          Expand-Archive $zip -DestinationPath .
          Rename-Item imgui-1.90.9 imgui

      # ── 4. Download Electrolize font and generate header ────
      # Source: https://github.com/google/fonts (OFL 1.1 — free to embed)
      # Using the raw GitHub URL from the google/fonts repo, which is always
      # up-to-date and avoids the versioned fonts.gstatic.com URLs going stale.
      - name: Download Electrolize-Regular.ttf
        shell: pwsh
        run: |
          $url = 'https://github.com/google/fonts/raw/main/ofl/electrolize/Electrolize-Regular.ttf'
          Invoke-WebRequest -Uri $url -OutFile 'Electrolize-Regular.ttf'
          Write-Host "Downloaded: $((Get-Item 'Electrolize-Regular.ttf').Length) bytes"

      - name: Generate font_electrolize.h from Electrolize-Regular.ttf
        shell: msys2 {0}
        run: |
          set -e
          TTF="Electrolize-Regular.ttf"
          OUT="src/font_electrolize.h"
          if [ -f "$TTF" ]; then
            echo "Generating $OUT from $TTF ..."
            echo '#pragma once' > "$OUT"
            xxd -i "$TTF" | sed \
              -e 's/unsigned char [A-Za-z0-9_]*_ttf/const unsigned char electrolize_regular_ttf/g' \
              -e 's/unsigned int [A-Za-z0-9_]*_ttf_len/const unsigned int electrolize_regular_ttf_len/g' \
              >> "$OUT"
            echo "OK — $(wc -c < $OUT) bytes written to $OUT"
          else
            echo "ERROR: $TTF not found"
            exit 1
          fi

      # ── 5. Build ────────────────────────────────────────────
      - name: Build SightlinePlayer.exe
        shell: msys2 {0}
        run: |
          set -e

          IMGUI=imgui

          SRC="src/main.cpp \
              $IMGUI/imgui.cpp \
              $IMGUI/imgui_draw.cpp \
              $IMGUI/imgui_tables.cpp \
              $IMGUI/imgui_widgets.cpp \
              $IMGUI/backends/imgui_impl_win32.cpp \
              $IMGUI/backends/imgui_impl_dx9.cpp"

          INC="-Isrc -I$IMGUI -I$IMGUI/backends"
          DEFS="-DWINVER=0x0501 -D_WIN32_WINNT=0x0501 -DWIN32_LEAN_AND_MEAN"
          FLAGS="-m32 -O2 -mwindows -static -static-libgcc -static-libstdc++"
          LIBS="-ld3d9 -ldwmapi -luser32 -lgdi32 -lshell32"

          g++ $FLAGS $DEFS $INC $SRC -o SightlinePlayer.exe $LIBS

          echo "Build OK — $(du -h SightlinePlayer.exe)"

      # ── 6. Upload artifact ──────────────────────────────────
      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: SightlinePlayer-x86-XPcompat
          path: SightlinePlayer.exe
          retention-days: 30
